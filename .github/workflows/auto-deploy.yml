name: Auto Deploy to Vercel

on:
  schedule:
    # 每天北京时间早上6:00触发 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 也支持手动触发

permissions:
  contents: write

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update deploy timestamp
        run: |
          echo "Last auto-deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .deploy-timestamp

      - name: Commit and push
        run: |
          git config user.name "Auto Deploy Bot"
          git config user.email "bot@notion-next-blog"
          git add .deploy-timestamp
          git diff --cached --quiet || git commit -m "chore: auto trigger Vercel deployment [skip ci]"
          git push
